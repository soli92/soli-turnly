# factory.config.yaml — configurazione factory soli-turnly (v2.32)
# PATTERN §13 (topology) §14 (stack) §15 (VCS) §16 (sync) §17 (publisher)
# §18 (scheduler) §19 (CQRL) §20 (compression) §24 (design intelligence)
# §25 (semantic drift) §27 (prototype generation) §28 (tavola rotonda)
# §29 (factory scalability patterns EP-040) §30 (voice channel EP-041)
# §31 (hybrid wiki search EP-042)

project_name: "soli-turnly"
language: it
owner: "soli92"
pattern_version: "2.32"

topology: full-stack-agents   # knowledge-only | plan-only | full-stack-agents | hybrid-be-agents | hybrid-fe-agents | custom

code_paths:
  - name: app
    path: "code/app"
    layers: [be, fe, db, qa]
    tags: [turnazione, scheduling]
    vcs:
      mode: monorepo           # monorepo | submodule | sibling | external | none
      branch_strategy: feature-branches
      commit_coupling: loose

stack_mode: guided             # manual | guided | auto

adapters:
  - claude

kanban_publish:
  provider: none               # none | github | gitlab | jira | linear | custom
  mode: push-only

# =============================================================
# Central Model Registry (EP-040, PATTERN §29.2)
# Unico posto per aggiornare model ID per tutti gli agenti.
# =============================================================
models:
  routing:
    tier_fast:    claude-haiku-4-5-20251001   # orchestrator, wiki-lint, sync agents
    tier_default: claude-sonnet-4-6           # maggioranza agenti
    tier_deep:    claude-opus-4-8             # code-reviewer, lead-architect
  overrides: {}                               # {agent_name: model_id} per eccezioni

scheduler:
  enabled: true
  max_parallel: 8
  parallel_gate_threshold: 3
  code_path_conflict: strict
  empty_code_path_policy: serial
  domains:
    ingest: true
    develop: true
    lint: true
    query: true
    plan: true
    design: true
    publish: false             # richiede kanban_publish.provider configurato
    sync: true
    review: true               # CQRL v2.12 — attivo
    visual-oracle: true        # v2.17 — ATTIVO
    a11y: true                 # v2.18 — ATTIVO
    ux-ui-review: true         # v2.18 — ATTIVO
    functional-oracle: true    # v2.20 — ATTIVO
    premortem: true            # v2.16 — ATTIVO
    prototype: true            # v2.26 EP-035 — ATTIVO

code_quality:
  enabled: true                # CQRL opt-in (v2.12) — ATTIVO
  max_iterations: 3
  thresholds:
    confidence_min: 0.6
    batching_split: 7
    pass_rate_warn: 0.05
    false_positive_warn: 0.30
  passes:
    idiomaticity: true
    design: true
    robustness: true
    accessibility: true        # v2.18 — ATTIVO
  router:
    strategy: severity-tiered
    max_diff_lines: 80
  ruleset:
    path: "code_quality/rules"
  reports:
    path: "code_quality/reports"

compression:
  output:
    enabled: true              # OCL opt-in (v2.14, R.C6) — ATTIVO
    provider: caveman
    policy_profile: conservative   # conservative | aggressive | custom
    drift_fallback: ambiguous_handoff_marker
    chain_depth_downgrade: true
    cross_factory: off
  context:
    enabled: false             # CCL opt-in (v2.14, R.G6) — richiede graphify provider
    provider: none             # none | graphify-cloud | graphify-ollama
    update_strategy: incremental
    full_rebuild_cron: "0 0 * * 0"   # weekly
    ci_strategy: cache-with-fallback
    confidence_gating:
      executor: EXTRACTED
      explorer: EXTRACTED,INFERRED
      reviewer: all
    full_rebuild_cost_warn: 5.0
    mcp_server: per-agent
    targets: []

fe_correctness:
  enabled: true                # Visual Oracle master switch (v2.17) — ATTIVO
  max_iterations: 3
  viewports:
    - {name: mobile, width: 375}
    - {name: desktop, width: 1280}
  themes: [light, dark]
  checks: [visual-regression, axe-a11y, interaction-test]   # v2.17 — ATTIVI
  state_matrix_inject: true
  granularity_lint: true
  granularity: {max_estimate_hours: 8, max_states: 3}
  dispatch_gate: true
  functional_oracle:           # v2.20 EP-018 — ATTIVO
    enabled: true
    max_iterations: 3
    critic: advisory
    acceptance_spec_glob: "code_quality/acceptance/*.acceptance.yaml"

a11y:                          # v2.18 EP-007 — ATTIVO
  enabled: true
  agent: true
  standard: "wcag22aa"
  severity_threshold: critical
  required_on_fe_done: true
  fail_ci_on: critical
  include_interactive: true
  fallback_non_web: snippet-inline

ux_ui:                         # v2.18 EP-008 — ATTIVO
  enabled: true
  max_iterations: 3
  rubric_strict: true
  design_system_path: ""
  default_viewports:
    - {name: mobile,  width: 375}
    - {name: desktop, width: 1280}
  agents:
    reviewer: true
    designer: true
  required_on_fe_done: true
  delegate_a11y_to_ep007: true

design_intelligence:           # v2.21 EP-019 — ATTIVO (richiede ux_ui.enabled: true)
  enabled: true
  art_director: true
  generator_tool: none         # none | plop | yeoman
  critic_enabled: true
  rubric_intention_economy: true

wiki_lint:                     # v2.23 EP-031 — Semantic Drift Detection — ATTIVO
  semantic_check:
    enabled: true
    similarity_threshold: 0.75
    embedding_model: voyage-3  # voyage-3 | text-embedding-3-small
    cost_warn_usd: 1.0
    output_report: true
    output_report_path: "code_quality/reports/"

analytics:
  measurement:
    enabled: true              # EP-009 Task Analytics measurement — attivo (supporta Token Ledger)
    agent: false
  estimation:
    enabled: true              # EP-010 Task Analytics estimation — ATTIVO
    agent: false
  dogfooding:                  # v2.19 EP-013 — ATTIVO
    enabled: true
    privacy_policy_path: "analytics/PRIVACY.md"
    lock_strategy: flock-advisory
    idempotency_strategy: hash-compound
  token_ledger:                # v2.21 EP-022 — ATTIVO
    enabled: true
    display_mode: compact      # compact | full
    show_cache_savings: true
    auto_call_on_wave_close: false
    pricing_fallback: prefix-based
  sprint_progress:             # v2.30 EP-043 — ATTIVO
    enabled: true
    velocity_rolling_days: 7

release_governance:            # §22 — governance META, default false in factory derivate
  battle_test_gate:
    enabled: false

# Prototype Generation Layer (v2.26, EP-035, PATTERN §27) — ATTIVO
prototyping:
  enabled: true                # master switch EP-035
  backend: auto
  fallback_chain: [figma, penpot, react, html]
  degrade_policy: notify
  fidelity: interactive
  design_source: auto
  art_director: inherit
  output_path: "output/prototypes"
  oracle_handoff: true
  scheduler_domain: prototype
  backends:
    html:
      css_strategy: tailwind-cdn
      single_file: true
    react:
      component_lib: shadcn
      storybook: true
      target: null
    figma:
      mcp_server: "figma"
      file_key: ""
    penpot:
      mcp_server: "penpot"
      instance_url: ""

# Tavola Rotonda — modalita' multi-agente collaborativa (EP-039, PATTERN §28) — ATTIVO
tavola_rotonda:
  enabled: true
  partecipanti: []
  critico:
    enabled: true
    mode: dedicated
  max_round: 4
  stop_su_consenso: true
  definizione_consenso: unanimity
  meccanismo_decisione: ibrido
  budget:
    max_cost_usd: ~
    max_tokens: ~
    max_latency_s: ~
  topologia: lavagna
  sintesi_progressiva: true

# Voice Channel Layer (EP-041/EP-044/EP-046, PATTERN §30) — ATTIVO
# Richiede setup: /voice-install per provisioning (PID manager, STT, TTS)
voice_channel:
  enabled: true

# Hybrid Wiki Search Layer (EP-042, PATTERN §31) — ATTIVO
# Richiede: pip install sentence-transformers lancedb (primo run crea l'indice)
wiki_search:
  enabled: true
  embedding_provider: local
  embedding_model: paraphrase-multilingual-MiniLM-L12-v2
  embedding_dim: 384
  index_path: .wiki-search/index.lance
  index_table: pages
  chunk_strategy: h2-section
  mode: hybrid
  rrf_k: 60
  candidate_k: 20
  top_k: 5
  exclude_types: [meta]

# Temporal Generative Time Model (EP-043) — ATTIVO
temporal:
  estimate_protocol:
    enabled: true
    budget_ms:
      S: 900000
      M: 3600000
      L: 14400000
      XL: 57600000
    thresholds:
      warn_time_ratio: 1.5
      escalate_time_ratio: 5.0
      escalate_confidence_min: 0.1

# Capability Formativa (EP-045) — ATTIVO
capability_formativa:
  enabled: true
  wiki_search_integration: true   # richiede wiki_search.enabled: true

# VCS Branch Awareness Layer (v2.25, EP-034) — ATTIVO
vcs:
  mode: monorepo
  base_branch: main
  branch_strategy: feature-branches
  branch_awareness:
    enabled: true
    preflight: true
    dispatch_gate: warn          # off | warn | block
    auto_align: propose          # off | propose (mai checkout silente, R.B8)
    drift_check: true
