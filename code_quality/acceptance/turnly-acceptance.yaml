- id: T-REC-01
  title: "Ricorrenza su giorno di assenza: occorrenza saltata"
  category: recurrence
  priority: major
  requires: [TSK-006]
  precondition: |
    Luca Bianchi in ferie 14–18 lug.
    Ricorrenza settimanale Mattina ogni lunedì assegnata a Luca.
  steps:
    - Genera ricorrenza per il periodo 14–31 lug
  acceptance:
