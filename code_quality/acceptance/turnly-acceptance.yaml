# ═══════════════════════════════════════════════
# T-INT — Integrazione componenti
# ═══════════════════════════════════════════════

- id: T-INT-01
  title: "Parità validazione UI ↔ API (Zod schema condiviso)"
  category: integration
  priority: critical
  requires: [TSK-006, TSK-007]
  precondition: |
    Admin autenticato. Matrice turni aperta per la settimana 14–20 lug 2026.
    Mario Rossi ha un turno Mattina 06:00–14:00 lunedì 14.
  steps:
    - Clicca cella lunedì 14 riga Mario Rossi
    - Nell'editor turno seleziona Pomeriggio 14:00–22:00 (sovrapposto: 06:00–14:00 ∩ 14:00–22:00 = nessuna sovrapposizione — ok)
    - Poi seleziona un turno che inizia alle 10:00 (sovrapposizione con 06:00–14:00)
  acceptance:
    - La UI mostra errore RB-01 ("sovrapposizione") PRIMA del salvataggio
    - Il POST /api/shifts risponde 400 con `{ rule: "RB-01", message: "Sovrapposizione turni" }`
    - Il messaggio di errore FE e BE hanno la stessa struttura (`rule`, `message`, `field`)
    - Nessun turno viene salvato nel DB

- id: T-INT-02
  title: "Concurrent write — un solo turno sovrapposto passa (PostgreSQL EXCLUDE gist)"
  category: integration
  priority: critical
  requires: [TSK-002, TSK-004]
  precondition: |
    DB pulito. Mario Rossi senza turni lunedì 14 lug.
  steps:
    - Due sessioni Admin (A e B) aprono contemporaneamente l'editor per lunedì 14 Mario Rossi
    - Entrambe selezionano Mattina 06:00–14:00 e cliccano Salva quasi simultaneamente
  acceptance:
    - Uno dei due POST /api/shifts risponde 200 (turno creato)
    - L'altro risponde 409 Conflict (EXCLUDE gist constraint)
    - DB ha esattamente 1 turno per Mario Rossi lunedì 14
    - audit_log ha 2 entry: 1 successo + 1 rifiuto con motivo "db_constraint_overlap"

- id: T-INT-03
  title: "Invio richiesta → badge inbox e notifica aggiornati in tempo utile"
  category: integration
  priority: major
  requires: [TSK-008, TSK-004]
  precondition: |
    Admin e dipendente Anna Verdi entrambi loggati in sessioni separate.
    Badge inbox admin = 0. Anna non ha richieste pendenti.
  steps:
    - Anna invia richiesta ferie 20–27 lug
    - Osserva la UI dell'admin (senza ricaricare la pagina)
  acceptance:
    - Il badge inbox dell'admin si incrementa a 1 entro 3 secondi (SSE)
    - L'admin vede la richiesta nella coda senza refresh
    - Anna vede la propria richiesta in stato "inviata" nella lista richieste

# ═══════════════════════════════════════════════
# T-DOM — Correttezza dominio
# ═══════════════════════════════════════════════

- id: T-DOM-01
  title: "Turno notturno: durata 8h, attraversaMezzanotte = true"
  category: domain
  priority: critical
  requires: [TSK-002, TSK-006]
  precondition: Admin crea una nuova tipologia turno.
  steps:
    - Nome: "Notte", oraInizio: "22:00", oraFine: "06:00"
    - Salva
  acceptance:
    - durataMinuti = 480 (8h)
    - attraversaMezzanotte = true
    - La data di competenza del turno è quella del giorno di inizio (22:00)

- id: T-DOM-02
  title: "RB-01: sovrapposizione turni bloccata"
  category: domain
  priority: critical
  requires: [TSK-006]
  precondition: |
    Mario Rossi ha Mattina 08:00–16:00 mercoledì 15.
  steps:
    - Admin tenta di assegnare a Mario Rossi Pomeriggio 14:00–22:00 mercoledì 15
  acceptance:
    - La UI mostra errore bloccante (rosso) sulla cella
    - Il salvataggio è impedito (bottone Salva disabilitato o rimosso)
    - Il server risponde 400 `{ rule: "RB-01" }` se la richiesta arriva ugualmente

- id: T-DOM-03
  title: "RB-02: avviso riposo < 11h"
  category: domain
  priority: major
  requires: [TSK-006]
  precondition: |
    Mario Rossi finisce alle 22:00 martedì 14 (Pomeriggio).
  steps:
    - Admin assegna Mattina 06:00–14:00 mercoledì 15 (riposo: 8h < 11h)
  acceptance:
    - La UI mostra avviso giallo (⚠) sulla cella con "Riposo < 11h (RB-02)"
    - Il salvataggio è consentito previa conferma esplicita dell'admin
    - Il server accetta con `warnings: ["RB-02"]` nel response body

- id: T-DOM-04
  title: "RB-08: turno in assenza bloccato"
  category: domain
  priority: critical
  requires: [TSK-006]
  precondition: |
    Luca Bianchi in ferie 10–14 lug (assenza attiva registrata).
  steps:
    - Admin tenta di assegnare un turno a Luca Bianchi venerdì 12 lug
  acceptance:
    - La cella è marcata come "ASSENZA" nella matrice
    - Il tentativo di assegnazione risponde errore bloccante "RB-08"
    - Nessun turno creato nel DB

- id: T-DOM-05
  title: "RB-04: avviso 7 giorni consecutivi"
  category: domain
  priority: major
  requires: [TSK-006]
  precondition: |
    Sara Neri ha 6 turni consecutivi lun–sab.
  steps:
    - Admin assegna un turno a Sara domenica (7° giorno consecutivo)
  acceptance:
    - Avviso (⚠) "7 giorni consecutivi (RB-04)" visibile nella matrice
    - Salvataggio consentito con conferma

- id: T-DOM-06
  title: "RB-06: calcolo straordinari corretto"
  category: domain
  priority: major
  requires: [TSK-006]
  precondition: |
    Paolo Blu, contratto 40h/settimana.
  steps:
    - Assegna turni per 46h totali nella settimana 14–20 lug
    - Apri Report Ore
  acceptance:
    - oreOrdinarie = 40h, oreStraordinarie = 6h, totale = 46h
    - Badge ⚠ nella riga di Paolo nel report (soglia 40h mensili non ancora superata)

- id: T-DOM-07
  title: "RB-07: sotto-copertura segnalata"
  category: domain
  priority: major
  requires: [TSK-006]
  precondition: |
    Fabbisogno notte mercoledì: 3 Infermieri.
    Turno notte mercoledì: 2 Infermieri assegnati.
  steps:
    - Apri vista Fabbisogni/Coperture, tab Monitor
  acceptance:
    - Cella notte mercoledì marcata rosso con "-1"
    - Tooltip/dettaglio: "Richiesti 3 Infermieri, pianificati 2"

- id: T-DOM-08
  title: "RB-12: durata corretta attraverso cambio ora legale (DST)"
  category: domain
  priority: critical
  requires: [TSK-006]
  precondition: |
    timezone = Europe/Rome.
    Data: ultima domenica di marzo (DST forward: 02:00 → 03:00).
  steps:
    - Crea turno Notte 22:00 sabato → 06:00 domenica (DST forward night)
  acceptance:
    - durataMinuti = 420 (7h, non 8h) — 1h persa per DST
    - Il campo `attraversaMezzanotte = true`
    - Nessun errore di calcolo; le ore straordinarie usano la durata reale

