# =============================================================================
# analytics/pricing.yaml — Pricing table (costi modello LLM + tool deterministici)
# =============================================================================
# EP-009 (Task Analytics & Measurement) — ADR-022 §B
# Capability: [[task-analytics-cost-estimation-capability]]
#   wiki/concepts/task-analytics-cost-estimation-capability.md
#
# TEMPLATE opt-in (R.P3): questo è un *.template. Copialo in
# `analytics/pricing.yaml` e adattalo. Finché il file non-template non esiste e
# `analytics.measurement.enabled` resta false, nulla è attivato (no lint ERROR).
#
# Single-writer logico: PM/Arch della factory derivata, **manuale via PR**.
#   Nessun tool del framework modifica questo file a runtime.
# Lettori: compute_agentic_cost (US-034), build_reference_class (US-041),
#          report (US-037) — via la skill `cost-and-time-analytics` (US-036).
#
# Versioning: **git history** è lo storico autorevole. NON esiste un campo
#   `version:` interno. Ogni cambio = un commit convenzionale
#   (es. `chore(pricing): bump claude-opus-4-7 input price 2026-07-01`).
#
# INVARIANTE — mai hardcodare prezzi nei tool: i tool di costo leggono SEMPRE
#   da qui. Un modello sconosciuto → fail-loud (vedi ADR-022 §D / §G), mai
#   imputazione silente di costo zero.
#
# valid_from semi-aperto a destra (ADR-022 §E): una entry è valida dal suo
#   `valid_from` finché la entry **successiva** non la sostituisce. Lista
#   ordinata ascendente per `valid_from`. Almeno una entry per modello.
#
# No retroactive edit (ADR-022 §E): NON modificare una entry con `valid_from`
#   nel passato (altereresti costi storici già calcolati). Per cambiare prezzo:
#   appendi una nuova entry. Per un vero fix di dato anomalo: commit esplicito
#   `fix(pricing): retroactive correction for entry valid_from=YYYY-MM-DD, reason=...`.
# =============================================================================

currency: EUR                          # ISO 4217. Single currency per file (ADR-022 §B). Default EUR.

models:
  - id: claude-opus-4-7                # <<model_id>> canonical: lowercase, kebab-case, no dots, no [bracket] di versione.
    provider: anthropic                # informativo, nessuna logica dipende da questo campo.
    display_name: "Claude Opus 4.7"    # human-readable per i report.
    aliases:                           # inverse mapping: varianti raw accettate nell'evento, risolte a `id`.
      - claude-opus-4.7                #   formato Anthropic SDK (dots)
      - claude-opus-4-7[1m]            #   formato Claude Code (suffix bracket)
      - anthropic/claude-opus-4-7      #   formato OpenRouter (prefix provider)
    pricing:                           # lista ordinata asc per valid_from. Almeno una entry obbligatoria.
      # fix(pricing): retroactive correction for entry valid_from=2026-01-01, reason=valori
      # precedenti (15/75) non allineati al listino ufficiale Anthropic. Opus 4.7 = $5/$25
      # (uguale a Opus 4.8). Fonte: skill claude-api 2026. Rimosso anche il tier 2026-07-01
      # fabbricato (12/60, nessuna variazione di listino reale nota). Unità: USD/1M (vedi caveat opus-4-8).
      - valid_from: 2026-01-01
        input_per_1m_tokens: 5.0
        output_per_1m_tokens: 25.0
        cache_read_per_1m_tokens: 0.5   # 0.1x input
        cache_write_per_1m_tokens: 6.25 # 1.25x input (5m TTL)

  - id: claude-opus-4-8                # modello reale di questa factory (sessioni Claude Code 2026).
    provider: anthropic
    display_name: "Claude Opus 4.8"
    aliases:
      - claude-opus-4.8                #   formato Anthropic SDK (dots)
      - claude-opus-4-8[1m]            #   formato Claude Code (suffix bracket) — è quello che appare nei transcript
      - anthropic/claude-opus-4-8      #   formato OpenRouter (prefix provider)
    pricing:
      - valid_from: 2026-01-01
        # PREZZI DI LISTINO UFFICIALI ANTHROPIC (USD per 1M token), fonte: skill claude-api 2026.
        # NB CURRENCY: il resto del file etichetta i campi come "EUR" ma l'entry opus-4-7 sopra
        # usa numeri non allineati al listino reale opus-4-7 ($5/$25). Qui uso i valori USD ufficiali.
        # Se la factory ragiona in EUR, il maintainer applichi il tasso di cambio (decisione umana, ADR-022 §A).
        # Cache: read = 0.1x input, write-5m = 1.25x input (moltiplicatori standard Anthropic).
        # Opus 4.8 = contesto 1M a prezzo standard (nessun premio long-context).
        input_per_1m_tokens: 5.0
        output_per_1m_tokens: 25.0
        cache_read_per_1m_tokens: 0.5
        cache_write_per_1m_tokens: 6.25

  - id: claude-opus-4-6                # Opus 4.6 (legacy attivo). Listino ufficiale = $5/$25.
    provider: anthropic
    display_name: "Claude Opus 4.6"
    aliases:
      - claude-opus-4.6
      - claude-opus-4-6[1m]
      - anthropic/claude-opus-4-6
    pricing:
      - valid_from: 2026-01-01         # USD/1M, fonte skill claude-api. Cache: read 0.1x, write-5m 1.25x.
        input_per_1m_tokens: 5.0
        output_per_1m_tokens: 25.0
        cache_read_per_1m_tokens: 0.5
        cache_write_per_1m_tokens: 6.25

  - id: claude-fable-5                # Fable 5 (più capace, 2026). Listino ufficiale = $10/$50.
    provider: anthropic
    display_name: "Claude Fable 5"
    aliases:
      - claude-fable.5                #   formato Anthropic SDK (dots)
      - claude-fable-5[1m]            #   formato Claude Code (suffix bracket)
      - anthropic/claude-fable-5      #   formato OpenRouter (prefix provider)
    pricing:
      - valid_from: "2026-06-15"      # USD/1M, fonte skill claude-api 2026-06-04.
        # Cache: read = 0.1x input ($10 × 0.1 = $1.00), write-5m = 1.25x input ($10 × 1.25 = $12.50).
        input_per_1m_tokens: 10.0
        output_per_1m_tokens: 50.0
        cache_read_per_1m_tokens: 1.0
        cache_write_per_1m_tokens: 12.5

  - id: claude-sonnet-4-6             # Sonnet 4.6 (corrente). Listino ufficiale = $3/$15.
    provider: anthropic
    display_name: "Claude Sonnet 4.6"
    aliases:
      - claude-sonnet-4.6
      - claude-sonnet-4-6[1m]         #   formato Claude Code (suffix bracket)
      - anthropic/claude-sonnet-4-6
    pricing:
      - valid_from: 2026-01-01         # USD/1M, fonte skill claude-api. Cache: read 0.1x, write-5m 1.25x.
        input_per_1m_tokens: 3.0
        output_per_1m_tokens: 15.0
        cache_read_per_1m_tokens: 0.3
        cache_write_per_1m_tokens: 3.75

  - id: claude-haiku-4-5              # Haiku 4.5 (corrente). Listino ufficiale = $1/$5.
    provider: anthropic
    display_name: "Claude Haiku 4.5"
    aliases:
      - claude-haiku-4.5
      - claude-haiku-4-5-20251001       # full id (skill models table)
      - anthropic/claude-haiku-4-5
    pricing:
      - valid_from: 2026-01-01         # USD/1M, fonte skill claude-api. Cache: read 0.1x, write-5m 1.25x.
        input_per_1m_tokens: 1.0
        output_per_1m_tokens: 5.0
        cache_read_per_1m_tokens: 0.1
        cache_write_per_1m_tokens: 1.25

  - id: claude-sonnet-4                # modello esempio (Sonnet 4.0, storico). $3/$15 — corretto.
    provider: anthropic
    display_name: "Claude Sonnet 4"
    aliases:
      - claude-sonnet-4.0
      - anthropic/claude-sonnet-4
    pricing:
      - valid_from: 2026-01-01
        input_per_1m_tokens: 3.0
        output_per_1m_tokens: 15.0
        cache_read_per_1m_tokens: 0.3
        cache_write_per_1m_tokens: 3.75

  - id: gpt-4-1                        # terzo modello esempio (provider diverso).
    provider: openai
    display_name: "GPT-4.1"
    aliases:
      - gpt-4.1
      - openai/gpt-4.1
    pricing:
      - valid_from: 2026-01-01
        input_per_1m_tokens: 10.0
        output_per_1m_tokens: 30.0
        # cache_*_per_1m_tokens omessi = 0: assenza significa "no cache pricing" per il provider (ADR-022 §B).

tools:                                 # tool deterministici prezzati (es. axe scan, Figma API). Sezione opzionale.
  - name: run_a11y_scan                # nome del tool come appare in event.tool_calls[].name.
    cost_unit: scan                    # informativo (corrisponde a tool_calls[].cost_unit).
    pricing:
      - valid_from: 2026-01-01
        price_per_unit: 0.0            # default open-source (axe). Può essere >0 per integrazioni a pagamento.
  - name: figma_api_call
    cost_unit: call
    pricing:
      - valid_from: 2026-01-01
        price_per_unit: 0.001          # EUR per chiamata API.
